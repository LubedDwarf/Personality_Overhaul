 pop_dynamic_events.5001.t: "A Question of Reciprocity"
 pop_dynamic_events.5001.d: "[scope:obligation_proposer.GetShortUIName] has requested a closed-door meeting to discuss our mutual standing. The air grows thick with unspoken demands."
 pop_dynamic_events.5001.a: "We will settle this via institutional frameworks and duty. (Dutiful/Devoted)"
 pop_dynamic_events.5001.b: "This is a quiet snare... and I am forced to sign away my protection. (Cunning/Resolute)"
 pop_dynamic_events.5001.c: "A beautiful agreement for the collective safety of our households. (Compassionate/Sociable)"
 pop_dynamic_events.5001.d: "I-I accept your terms! Just ensure no harm comes to my line! (Timid Capitulation)"
 pop_dynamic_events.5001.e: "The shadow spiders demand a completely different transaction! (Erratic Scramble)"

